<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Dashboard Iglesia Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:#0b1320;
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:25px;
background:#111827;
border-bottom:1px solid #1f2937;
}

.kpi{
font-size:40px;
font-weight:bold;
color:#60a5fa;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.grid-bottom{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#111827;
padding:8px;
}

td{
text-align:center;
padding:8px;
border-bottom:1px solid #374151;
}

.check{color:#22c55e;font-size:18px;}
.cross{color:#ef4444;font-size:18px;}

button{
background:#2563eb;
color:white;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">

<div>
<h2>Dashboard Iglesia</h2>
</div>

<div>
<div>Total General</div>
<div class="kpi" id="total">0</div>
</div>

</div>

<div class="grid">

<div class="card">
<h3>Comparativo Sesiones</h3>
<canvas id="chartSesiones"></canvas>
</div>

<div class="card">
<h3>Ranking Ministerios</h3>
<div id="ranking"></div>
</div>

</div>

<div class="grid-bottom">

<div class="card">

<h3>Buscar por Ministerio</h3>

<select id="ministerioSelect"></select>
<button onclick="buscarMinisterio()">Buscar</button>

<div id="tablaMinisterio"></div>

</div>

<div class="card">

<h3>Buscar Servidor</h3>

<select id="servidorSelect"></select>
<button onclick="buscarServidor()">Buscar</button>

<div id="resultadoServidor"></div>

</div>

</div>

<script>

const URL1="https://script.google.com/macros/s/AKfycbw3j-KijDNx7CaKtqU8oU6tzdqSaDFFcF4lJKm_SpWH4BAs7ql-AJsvjAM_7-xJ0Nw0/exec?accion=dashboardpro";
const URL2="https://script.google.com/macros/s/AKfycbw3j-KijDNx7CaKtqU8oU6tzdqSaDFFcF4lJKm_SpWH4BAs7ql-AJsvjAM_7-xJ0Nw0/exec?accion=datoscompletos";

let datosGlobal;
let chart;

async function iniciar(){

await actualizarDashboard();
await cargarDatosGlobal();

}

async function actualizarDashboard(){

const res=await fetch(URL1);
const data=await res.json();

document.getElementById("total").innerText=data.totalGeneral;

const nombres=data.sesiones.map(s=>s.nombre);
const totales=data.sesiones.map(s=>s.total);

if(chart){chart.destroy();}

chart=new Chart(document.getElementById("chartSesiones"),{

type:"bar",

data:{
labels:nombres,
datasets:[{
label:"Asistencia",
data:totales,
backgroundColor:"#3b82f6"
}]
},

plugins:[ChartDataLabels]

});

let html="<table>";

html+="<tr><th>Ministerio</th>";

data.sesiones.forEach(s=>{
html+=`<th>${s.nombre}</th>`;
});

html+="<th>Total</th></tr>";

data.rankingMinisterios.forEach(m=>{

html+=`<tr><td>${m.ministerio}</td>`;

let total=0;

data.sesiones.forEach(s=>{

let val=0;

if(datosGlobal &&
datosGlobal.ministerios[m.ministerio] &&
datosGlobal.ministerios[m.ministerio][s.id]){

val=datosGlobal.ministerios[m.ministerio][s.id];

}

total+=val;

html+=`<td>${val}</td>`;

});

html+=`<td><b>${total}</b></td></tr>`;

});

html+="</table>";

document.getElementById("ranking").innerHTML=html;

}

async function cargarDatosGlobal(){

const res=await fetch(URL2);
datosGlobal=await res.json();

cargarMinisterios();
cargarServidores();

}

function cargarMinisterios(){

const select=document.getElementById("ministerioSelect");
select.innerHTML="";

Object.keys(datosGlobal.servidoresPorMinisterio).forEach(m=>{

const op=document.createElement("option");
op.value=m;
op.text=m;

select.appendChild(op);

});

}

function cargarServidores(){

const select=document.getElementById("servidorSelect");
select.innerHTML="";

Object.keys(datosGlobal.asistenciaServidor).forEach(n=>{

const op=document.createElement("option");
op.value=n;
op.text=n;

select.appendChild(op);

});

}

function buscarMinisterio(){

const m=document.getElementById("ministerioSelect").value;

const sesiones=Object.keys(datosGlobal.sesiones);
const servidores=datosGlobal.servidoresPorMinisterio[m];

let html="<table>";

html+="<tr><th>Servidor</th>";

sesiones.forEach(s=>{
html+=`<th>${datosGlobal.sesiones[s]}</th>`;
});

html+="</tr>";

servidores.forEach(n=>{

html+=`<tr><td>${n}</td>`;

sesiones.forEach(s=>{

const asistio=datosGlobal.asistenciaServidor[n] && datosGlobal.asistenciaServidor[n][s];

html+=`<td>${asistio?'<span class="check">✔</span>':'<span class="cross">✖</span>'}</td>`;

});

html+="</tr>";

});

html+="</table>";

document.getElementById("tablaMinisterio").innerHTML=html;

}

function buscarServidor(){

const nombre=document.getElementById("servidorSelect").value;

const sesiones=Object.keys(datosGlobal.sesiones);

let html="<table>";

html+="<tr><th>Sesión</th><th>Asistencia</th></tr>";

sesiones.forEach(s=>{

const asistio=datosGlobal.asistenciaServidor[nombre] && datosGlobal.asistenciaServidor[nombre][s];

html+=`
<tr>
<td>${datosGlobal.sesiones[s]}</td>
<td>${asistio?'<span class="check">✔</span>':'<span class="cross">✖</span>'}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("resultadoServidor").innerHTML=html;

}

iniciar();

setInterval(actualizarDashboard,30000);

</script>

</body>
</html>
