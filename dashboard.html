<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Iglesia Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#111827;
}

.kpi {
  font-size:40px;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
  padding:20px;
}

.card {
  background:#1f2937;
  padding:20px;
  border-radius:10px;
}

.ranking-item {
  display:flex;
  justify-content:space-between;
  padding:5px 0;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <h2>Dashboard Iglesia</h2>
  </div>
  <div>
    <div>Total General</div>
    <div class="kpi" id="total">0</div>
  </div>
  <div>
    <div>Crecimiento</div>
    <div class="kpi" id="crecimiento">0%</div>
  </div>
</div>

<div class="grid">

  <div class="card">
    <h3>Comparativo Sesiones</h3>
    <canvas id="chartSesiones"></canvas>
  </div>

  <div class="card">
    <h3>Ranking Ministerios</h3>
    <div id="ranking"></div>
  </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxdjyCPva8tV9_1yzXxUdvC9T9VB2pB7-CL30zHaVthBV4dzdKEGyUddpinkAOusK7l/exec?accion=dashboardpro";

async function cargarDatos() {

  const res = await fetch(URL);
  const data = await res.json();

  document.getElementById("total").innerText = data.totalGeneral;
  document.getElementById("crecimiento").innerText = data.crecimiento + "%";

  // Sesiones Chart
  const nombres = data.sesiones.map(s => s.nombre);
  const totales = data.sesiones.map(s => s.total);

  new Chart(document.getElementById("chartSesiones"), {
    type: "bar",
    data: {
      labels: nombres,
      datasets: [{
        label: "Asistencia",
        data: totales,
        backgroundColor: "#3b82f6"
      }]
    }
  });

  // Ranking
  let html = "";
  data.rankingMinisterios.forEach((m,i) => {
    html += `
      <div class="ranking-item">
        <span>#${i+1} ${m.ministerio}</span>
        <strong>${m.total}</strong>
      </div>
    `;
  });

  document.getElementById("ranking").innerHTML = html;
}

cargarDatos();

// Auto refresh cada 30 segundos (Modo TV)
setInterval(() => {
  location.reload();
}, 30000);

</script>

</body>
</html>
