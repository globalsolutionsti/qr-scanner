<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Profesional de Asistencia</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  padding:20px;
}

input {
  padding:12px;
  font-size:18px;
  border-radius:6px;
  border:none;
  width:200px;
  text-align:center;
}

button {
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:6px;
  margin:10px;
  cursor:pointer;
}

#activar { background:#1e88e5; color:white; }
#cerrar { background:#e53935; color:white; }

#reader {
  width:300px;
  margin:auto;
  margin-top:20px;
}

#mensaje {
  font-size:20px;
  margin-top:20px;
  font-weight:bold;
}
.ok { color:#00e676; }
.error { color:#ff5252; }
</style>
</head>

<body>

<div class="container">

<h2>Sistema de Asistencia</h2>

<input type="password" id="pin" placeholder="Ingrese PIN"><br>
<button id="activar" onclick="iniciar()">Activar Sistema</button>
<button id="cerrar" onclick="cerrarSistema()">Cerrar Sistema</button>

<div id="reader"></div>
<div id="mensaje"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxkNHtDXkj2q0upsnTNopUYHgRgCgzFUfX7d0k7d754A0EssK6iv4aUv5Rq8zOVlTSL/exec/exec";

let html5QrCode;
let escaneando = false;
let pinGlobal = "";

function iniciar() {

  const pin = document.getElementById("pin").value.trim();
  if (!pin) { alert("Ingrese PIN"); return; }

  pinGlobal = pin;

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      qrCodeMessage => {

        if (escaneando) return;
        escaneando = true;

        registrar(qrCodeMessage);

      }
    );
  });
}

function registrar(id) {

  const url = API_URL +
    "?pin=" + encodeURIComponent(pinGlobal) +
    "&id=" + encodeURIComponent(id) +
    "&t=" + new Date().getTime();

  fetch(url)
    .then(res => res.json())
    .then(data => {

      const mensajeDiv = document.getElementById("mensaje");
      mensajeDiv.innerText = data.mensaje;

      if (data.mensaje.includes("Registrada")) {
        mensajeDiv.className = "ok";
      } else {
        mensajeDiv.className = "error";
      }

      setTimeout(() => {
        mensajeDiv.innerText = "";
        escaneando = false;
      }, 2500);
    })
    .catch(() => {
      document.getElementById("mensaje").innerText = "Error conexión servidor";
      escaneando = false;
    });
}

function cerrarSistema() {
  if (html5QrCode) {
    html5QrCode.stop();
    document.getElementById("reader").innerHTML = "";
  }
  document.getElementById("mensaje").innerText = "Sistema Cerrado";
}

</script>

</body>
</html>
