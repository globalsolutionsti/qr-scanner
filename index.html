<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Profesional de Asistencia</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align: center; background:#f4f4f4; }
#reader { width:300px; margin:auto; }
button { padding:10px; margin:10px; font-size:16px; }
#mensaje { font-size:18px; margin-top:15px; font-weight:bold; }
.ok { color: green; }
.error { color: red; }
</style>
</head>

<body>

<h2>Registro de Asistencia Iglesia Amistad Los Fuertes</h2>

<input type="password" id="pin" placeholder="Ingrese PIN"><br>
<button onclick="iniciar()">Activar Cámara</button>

<div id="reader"></div>
<div id="mensaje"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby1F-Ca38N6RsN7T4C7KsRMxmRywvUtNlc8L7Fsp2jG6hQKI6NVS00uYtuvzIL_TGqneg/exec";

let html5QrCode;
let escaneando = false;

function iniciar() {

  const pin = document.getElementById("pin").value.trim();

  if (!pin) {
    alert("Ingrese PIN");
    return;
  }

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (qrCodeMessage) => {

          if (escaneando) return; // evita múltiples lecturas
          escaneando = true;

          registrar(pin, qrCodeMessage);

        },
        (errorMessage) => {}
      );
    }
  }).catch(err => {
    alert("Error activando cámara");
  });
}

function registrar(pin, servidorID) {

  const url = API_URL +
    "?pin=" + encodeURIComponent(pin) +
    "&servidorID=" + encodeURIComponent(servidorID) +
    "&t=" + new Date().getTime(); // evita cache

  // Crear iframe invisible
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = url;

  document.body.appendChild(iframe);

  const mensajeDiv = document.getElementById("mensaje");
  mensajeDiv.innerText = "Procesando...";

  setTimeout(() => {
    mensajeDiv.innerText = "Registro enviado";
    escaneando = false;

    // eliminar iframe después de usarlo
    document.body.removeChild(iframe);
  }, 2000);
}
</script>

</body>
</html>
